global:
  scrape_interval: 60s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "one-question-api"
    scheme: http
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["10.0.0.246:8080"]
        labels:
          env: "main"
          vm: "main-vm"
      - targets: ["10.0.0.108:8080"]
        labels:
          env: "dev"
          vm: "dev-vm"

  # (틀만) Oracle exporter 스크랩 자리
  # oracle exporter를 켰을 때만 targets를 채우면 됨
  - job_name: "oracle-db"
    static_configs:
      - targets: ["127.0.0.1:9161"]
        labels:
          env: "main"
          component: "oracle"
